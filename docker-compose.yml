services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — data warehouse
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: football_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ---------------------------------------------------------------------------
  # Airflow — metadata database (separate postgres instance)
  # ---------------------------------------------------------------------------
  postgres_airflow:
    image: postgres:15
    container_name: airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ---------------------------------------------------------------------------
  # Airflow — initialization (runs once)
  # ---------------------------------------------------------------------------
  airflow_init:
    image: apache/airflow:2.9.1
    container_name: airflow_init
    depends_on:
      postgres_airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
 
  # ---------------------------------------------------------------------------
  # Airflow — webserver
  # ---------------------------------------------------------------------------
  airflow_webserver:
    image: apache/airflow:2.9.1
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      postgres_airflow:
        condition: service_healthy
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: 8080
      FOOTBALL_API_TOKEN: ${FOOTBALL_API_TOKEN}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./extraction:/opt/airflow/extraction
      - ./dbt:/opt/airflow/dbt
      - ./data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
    command: webserver
 
  # ---------------------------------------------------------------------------
  # Airflow — scheduler
  # ---------------------------------------------------------------------------
  airflow_scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow_scheduler
    restart: unless-stopped
    depends_on:
      postgres_airflow:
        condition: service_healthy
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      FOOTBALL_API_TOKEN: ${FOOTBALL_API_TOKEN}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./extraction:/opt/airflow/extraction
      - ./dbt:/opt/airflow/dbt
      - ./data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
    command: scheduler
 
volumes:
  postgres_data:
  airflow_postgres_data:
  airflow_logs: